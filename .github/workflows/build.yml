name: Build NetHunter Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 llvm lld clang

    - name: Clone Kernel Source
      run: |
        # Seedha LineageOS ka asli code clone kar rahe hain
        git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_sm8450 kernel_workspace

    - name: Download Clang Compiler
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

    - name: Apply RT5370 Modifications
      run: |
        cd kernel_workspace
        # Base file mein drivers add kar rahe hain
        CONFIG_FILE="arch/arm64/configs/gki_defconfig"

        echo "CONFIG_CFG80211=y" >> $CONFIG_FILE
        echo "CONFIG_MAC80211=y" >> $CONFIG_FILE
        echo "CONFIG_MAC80211_MONITOR=y" >> $CONFIG_FILE
        echo "CONFIG_WLAN_VENDOR_RALINK=y" >> $CONFIG_FILE
        echo "CONFIG_RT2X00=y" >> $CONFIG_FILE
        echo "CONFIG_RT2800USB=y" >> $CONFIG_FILE
        echo "Modifications added successfully to gki_defconfig!"

    - name: Compile Kernel
      run: |
        # Paths set karna
        export PATH=$(pwd)/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

        cd kernel_workspace
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 mrproper
        
        # Dono files (Base + Diting) ko mix karna
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 gki_defconfig vendor/diting_GKI.config
        
        # Pakhana shuru karna!
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 -j$(nproc --all)

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Kernel-${{ github.run_id }}
        path: kernel_workspace/out/arch/arm64/boot/Image
