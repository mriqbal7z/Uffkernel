name: Build NetHunter Kernel (Diting / SM8475)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 llvm lld clang

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_sm8450 kernel_workspace

    - name: Download AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

    - name: Apply RT5370 Modifications
      run: |
        cd kernel_workspace
        CONFIG_FILE="arch/arm64/configs/vendor/diting_GKI.config"
        echo "CONFIG_CFG80211=y" >> $CONFIG_FILE
        echo "CONFIG_MAC80211=y" >> $CONFIG_FILE
        echo "CONFIG_MAC80211_MONITOR=y" >> $CONFIG_FILE
        echo "CONFIG_WLAN_VENDOR_RALINK=y" >> $CONFIG_FILE
        echo "CONFIG_RT2X00=y" >> $CONFIG_FILE
        echo "CONFIG_RT2800USB=y" >> $CONFIG_FILE

    - name: Compile Kernel (Using Built-in Clang)
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        
        cd kernel_workspace
        # Pre-cleaning the environment
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 mrproper
        
        # Targetting Diting specifically with GKI configs
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 gki_defconfig vendor/diting_GKI.config
        
        # Start compilation
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 -j$(nproc --all)

    - name: Pack with AnyKernel3
      run: |
        cd AnyKernel3
        # Direct patching for Xiaomi 12T Pro
        sed -i 's/device.name1=maguro/device.name1=diting/g' anykernel.sh
        sed -i 's/device.name2=toro/device.name2=sm8475/g' anykernel.sh
        sed -i 's/is_slot_device=0;/is_slot_device=1;/g' anykernel.sh
        cp ../kernel_workspace/out/arch/arch/arm64/boot/Image ./
        zip -r9 NetHunter-Kernel-Diting.zip * -x .git README.md

    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Kernel-Diting
        path: AnyKernel3/NetHunter-Kernel-Diting.zip
