name: Build NetHunter Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3

    - name: Clone LineageOS Kernel
      run: |
        # Sirf latest code download karega (taake fast ho aur error na aaye)
        git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_sm8450 -b lineage-23.2 kernel_workspace
        
    - name: Download Clang Compiler
      run: |
        mkdir clang
        cd clang
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r450784d.tar.gz
        tar -xf clang-r450784d.tar.gz
        
    - name: Apply RT5370 Modifications
      run: |
        cd kernel_workspace
        # Yahan defconfig file ka rasta hai
        CONFIG_FILE="arch/arm64/configs/vendor/xiaomi/diting_defconfig" 
        
        # Wi-Fi Injection aur TP-Link RT5370 ki lines add ho rahi hain
        echo "CONFIG_CFG80211=y" >> $CONFIG_FILE
        echo "CONFIG_MAC80211=y" >> $CONFIG_FILE
        echo "CONFIG_MAC80211_MONITOR=y" >> $CONFIG_FILE
        echo "CONFIG_WLAN_VENDOR_RALINK=y" >> $CONFIG_FILE
        echo "CONFIG_RT2X00=y" >> $CONFIG_FILE
        echo "CONFIG_RT2X00_LIB=y" >> $CONFIG_FILE
        echo "CONFIG_RT2X00_LIB_USB=y" >> $CONFIG_FILE
        echo "CONFIG_RT2X00_LIB_FIRMWARE=y" >> $CONFIG_FILE
        echo "CONFIG_RT2X00_LIB_CRYPTO=y" >> $CONFIG_FILE
        echo "CONFIG_RT2800USB=y" >> $CONFIG_FILE
        echo "CONFIG_RT2800USB_RT53XX=y" >> $CONFIG_FILE
        echo "CONFIG_RT2800USB_UNKNOWN=y" >> $CONFIG_FILE
        echo "Modifications added successfully!"

    - name: Compile Kernel
      run: |
        export PATH=$(pwd)/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        
        cd kernel_workspace
        make O=out vendor/xiaomi/diting_defconfig 
        make O=out -j$(nproc --all)

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Kernel-Image
        path: kernel_workspace/out/arch/arm64/boot/Image
