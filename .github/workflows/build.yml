name: Build NetHunter Kernel (Fast Build)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source
      run: |
        git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_sm8450 kernel_workspace
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache flex bison gperf build-essential zip curl libssl-dev bc bc libc6-dev-i386 python3 clang llvm lld

    - name: Apply RT5370 Config
      run: |
        cd kernel_workspace
        CONFIG_FILE="arch/arm64/configs/vendor/diting_GKI.config"
        echo "CONFIG_CFG80211=y" >> $CONFIG_FILE
        echo "CONFIG_MAC80211=y" >> $CONFIG_FILE
        echo "CONFIG_WLAN_VENDOR_RALINK=y" >> $CONFIG_FILE
        echo "CONFIG_RT2X00=y" >> $CONFIG_FILE
        echo "CONFIG_RT2800USB=y" >> $CONFIG_FILE

    - name: Compile Kernel (Optimized)
      run: |
        cd kernel_workspace
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        # Using -j$(nproc) for maximum speed to beat the server timeout
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 gki_defconfig vendor/diting_GKI.config
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 -j$(nproc) Image

    - name: Pack and Upload
      run: |
        cp kernel_workspace/out/arch/arm64/boot/Image AnyKernel3/
        cd AnyKernel3
        sed -i 's/device.name1=maguro/device.name1=diting/g' anykernel.sh
        sed -i 's/is_slot_device=0;/is_slot_device=1;/g' anykernel.sh
        zip -r9 NetHunter-Diting.zip *
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Kernel-Diting
        path: AnyKernel3/NetHunter-Diting.zip
